name: Build and Release

on:
  push:
    branches:
      - ci-cd
      - master
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          cd build_scripts
          python build.py
        shell: powershell

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/AutoApiTest.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Check files before build
        run: |
          echo "=== Project structure ==="
          ls -la
          echo "=== build_scripts directory ==="
          ls -la build_scripts/
          echo "=== src directory ==="
          ls -la src/

      - name: Build macOS app
        run: |
          cd build_scripts
          echo "=== Starting PyInstaller build ==="
          python -m PyInstaller AutoApiTest-mac.spec --clean || {
            echo "=== PyInstaller failed ==="
            exit 1
          }
        shell: bash

      - name: Check build output
        run: |
          echo "=== Current directory: $(pwd) ==="
          echo "=== build_scripts contents ==="
          ls -la build_scripts/
          echo "=== build_scripts/dist contents ==="
          ls -la build_scripts/dist/ 2>/dev/null || echo "No build_scripts/dist"
          echo "=== dist contents ==="
          ls -la dist/ 2>/dev/null || echo "No dist"

      - name: Move dist to root
        run: |
          if [ -d "build_scripts/dist" ]; then
            mv build_scripts/dist .
            echo "Moved dist to root"
          fi
          ls -la dist/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/AutoApiTest.app
          retention-days: 30

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: release

      - name: Create DMG (macOS)
        run: |
          if [ -d "release/AutoApiTest.app" ]; then
            hdiutil create -volname "AutoApiTest" -srcfolder "release/AutoApiTest.app" -ov -format UDZO "release/AutoApiTest.dmg"
          else
            echo "App bundle not found, skipping DMG creation"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/AutoApiTest.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
