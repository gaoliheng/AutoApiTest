test_dimensions:
- description: 测试接口在正常输入和正确参数情况下的行为
  enabled: true
  id: happy_path
  name: 正常场景测试
  priority: high
- description: 测试参数在边界值情况下的行为（最大值、最小值、空值等）
  enabled: true
  id: boundary
  name: 边界值测试
  priority: medium
- description: 测试参数缺失、类型错误、权限问题等异常情况
  enabled: true
  id: error_case
  name: 异常场景测试
  priority: high
- description: 测试大数据量或高并发场景
  enabled: true
  id: performance
  name: 性能相关测试
  priority: low
